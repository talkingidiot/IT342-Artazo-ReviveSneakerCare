# ================================================
# Supabase PostgreSQL Connection Configuration
# ================================================
# Replace YOUR_PROJECT_REF and YOUR_DB_PASSWORD with your actual Supabase values.
# You can find these in: Supabase Dashboard > Settings > Database
# ================================================

spring.application.name=auth-backend

# Supabase JDBC Connection (PostgreSQL)
# Format: jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.ndzptenfxpuvswrfrwfm
spring.datasource.password=JbbQ_tX&tY/9cU2
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# JPA / Hibernate Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'update' during development; switch to 'validate' or 'none' in production
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Server Port
server.port=8080

# CORS is handled in code (CorsConfig.java)
# Max upload file size (for profile image uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Logging
logging.level.org.springframework=INFO
logging.level.com.authapp=DEBUG


app.jwt.secret=change-this-to-a-very-long-random-secret-at-least-32-characters
app.jwt.expiration-ms=86400000

# Upload directory
app.upload.dir=uploads
